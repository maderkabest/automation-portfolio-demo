name: CI

on:
  push:
  pull_request:
    branches: [main]


jobs:
  lint:
    name: "Lint (Ruff + Mypy)"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ruff
      run: ruff check src tests

    - name: Run Mypy
      run: mypy src

  api-tests:
    name: "API Tests"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest (API)
        run: pytest tests/api/  -v
        env:
          BASE_URL: ${{ vars.BASE_URL }}

  integration-tests:  
    name: "Integration Tests"
    needs: lint
    runs-on: ubuntu-latest
    services: 
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init database schema
        run: psql -h  localhost -U testuser -d testdb -f docker/init.sql
        env:
          PGPASSWORD: testpass

      - name: Run Pytest (API + integration)
        run: pytest tests/integration/ -v
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass

  ui-tests:
    name: "UI & Hybrid Tests"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
        
      - name: Check site availability and Cloudflare blocks
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -I ${{ vars.UI_URL }})
          echo "Website returned status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "403" ]; then
            echo "Cloudflare protection detected (403 Forbidden)."
            echo "Skipping UI tests on CI to avoid bot-challenge failures."
            echo "blocked=true" >> $GITHUB_ENV
          else
            echo "Site is accessible. Proceeding with UI tests."
            echo "blocked=false" >> $GITHUB_ENV
          fi

      - name: Run Pytest (UI + Hybrid)
        if: env.blocked == 'false'
        run: pytest tests/ui/ tests/hybrid/ 
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          UI_URL: ${{ vars.UI_URL }}

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: playwright-screenshots
          path: test-results/

      - name: Report CI Limitation
        if: env.blocked == 'true'
        run: |
          echo "### ⚠️ UI Tests Skipped" >> $GITHUB_STEP_SUMMARY
          echo "Target website (`${{ vars.UI_URL }}`) is protected by Cloudflare." >> $GITHUB_STEP_SUMMARY
          echo "GitHub Actions IP addresses are blocked by default (cf-mitigated: challenge)." >> $GITHUB_STEP_SUMMARY
          echo "To run these tests, execute them locally." >> $GITHUB_STEP_SUMMARY

  allure-report:
    name: "Allure Report → GitHub Pages"
    needs: [api-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init database schema
        run: psql -h localhost -U testuser -d testdb -f docker/init.sql
        env:
          PGPASSWORD: testpass

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Check site availability and Cloudflare blocks
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -I ${{ vars.UI_URL }})
          echo "Website returned status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "403" ]; then
            echo "blocked=true" >> $GITHUB_ENV
          else
            echo "blocked=false" >> $GITHUB_ENV
          fi

      - name: Run all tests with Allure
        if: env.blocked == 'false'
        run: pytest tests/api/ tests/integration/ tests/ui/ tests/hybrid/ --alluredir=allure-results -v
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          UI_URL: ${{ vars.UI_URL }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass

      - name: Run API + Integration tests with Allure (Cloudflare blocked)
        if: env.blocked == 'true'
        run: pytest tests/api/ tests/integration/ --alluredir=allure-results -v
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline

      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
